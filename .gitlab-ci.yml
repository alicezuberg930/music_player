stages:
  - build
  - publish
  - deploy

variables:
  DOCKER_IMAGE: $DOCKERHUB_USERNAME/your-app-name
  DOCKER_TAG: $CI_COMMIT_SHORT_SHA
  APP_NAME: your-app-name
  K8S_NAMESPACE: default

# Build JAR
build:
  stage: build
  tags:
    - docker  # targets your local docker runner
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

# Build Docker image and push to Docker Hub
publish:
  stage: publish
  tags:
    - docker
  image: docker:24
  services:
    - docker:24-dind
  dependencies:
    - build
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - docker build -t $DOCKER_IMAGE:$DOCKER_TAG -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$DOCKER_TAG
    - docker push $DOCKER_IMAGE:latest
  after_script:
    - docker logout

# SSH to VPS and rollout new deployment
deploy:
  stage: deploy
  tags:
    - docker
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh -i ~/.ssh/id_rsa $VPS_USER@$VPS_HOST << EOF
        kubectl set image deployment/$APP_NAME \
          $APP_NAME=$DOCKER_IMAGE:$DOCKER_TAG \
          -n $K8S_NAMESPACE
        kubectl rollout status deployment/$APP_NAME -n $K8S_NAMESPACE
      EOF
  environment:
    name: production